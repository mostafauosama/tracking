<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>RFID Finder V2</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a0a1a;
            color: white;
            padding: 16px;
            min-height: 100vh;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
        }
        .header {
            text-align: center;
            padding: 20px;
            background: linear-gradient(135deg, #4361ee, #3a0ca3);
            border-radius: 20px;
            margin-bottom: 20px;
        }
        .header h1 { font-size: 1.3rem; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .card {
            background: rgba(30, 30, 46, 0.95);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .target-input {
            width: 100%;
            padding: 15px;
            background: #1a1a2e;
            border: 2px solid #4361ee;
            border-radius: 12px;
            color: white;
            font-family: monospace;
            font-size: 16px;
            text-align: center;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }
        .debug-input {
            width: 100%;
            padding: 12px;
            background: #1a1a2e;
            border: 1px solid #f8961e;
            border-radius: 12px;
            color: #f8961e;
            font-family: monospace;
            font-size: 12px;
            margin-top: 10px;
            direction: ltr;
            text-align: left;
        }
        .btn-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .btn {
            padding: 12px 20px;
            border: none;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn-primary { background: #4361ee; color: white; }
        .btn-success { background: #06ffa5; color: #1a1a2e; }
        .btn-danger { background: #f72585; color: white; }
        .btn-warning { background: #f8961e; color: white; }
        .status-light {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            display: inline-block;
            margin-left: 8px;
        }
        .status-light.off { background: #555; }
        .status-light.searching { background: #f8961e; animation: blink 1s infinite; }
        .status-light.found { background: #06ffa5; box-shadow: 0 0 20px #06ffa5; animation: pulse 0.5s infinite; }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }
        .found-beacon {
            text-align: center;
            padding: 25px;
            background: rgba(6, 255, 165, 0.1);
            border-radius: 20px;
            margin-top: 15px;
            display: none;
            border: 2px solid #06ffa5;
            animation: glowPulse 0.8s infinite;
        }
        @keyframes glowPulse {
            0%, 100% { box-shadow: 0 0 20px rgba(6, 255, 165, 0.3); }
            50% { box-shadow: 0 0 50px rgba(6, 255, 165, 0.8); }
        }
        .found-beacon i { font-size: 3rem; color: #06ffa5; }
        .found-beacon h2 { color: #06ffa5; margin: 10px 0; font-size: 1.5rem; }
        .tag-list {
            max-height: 300px;
            overflow-y: auto;
        }
        .tag-item {
            background: #1a1a2e;
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
        }
        .tag-item.found {
            background: rgba(6, 255, 165, 0.2);
            border-right: 3px solid #06ffa5;
        }
        .tag-epc {
            font-family: monospace;
            font-size: 12px;
            font-weight: bold;
            direction: ltr;
            text-align: left;
        }
        .raw-data {
            font-size: 10px;
            color: #f8961e;
            font-family: monospace;
            margin-top: 4px;
        }
        .toast {
            position: fixed;
            bottom: 20px;
            left: 16px;
            right: 16px;
            background: rgba(0,0,0,0.95);
            border-radius: 50px;
            padding: 12px 20px;
            text-align: center;
            z-index: 1000;
            animation: slideUp 0.3s ease;
        }
        @keyframes slideUp {
            from { transform: translateY(100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        #hiddenScanner {
            position: fixed;
            top: -100px;
            left: -100px;
            opacity: 0;
        }
        .match-info {
            background: rgba(248, 150, 30, 0.2);
            padding: 10px;
            border-radius: 10px;
            margin-top: 10px;
            font-size: 12px;
        }
        .match-info span {
            color: #f8961e;
            font-family: monospace;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1><i class="fas fa-warehouse"></i> RFID Warehouse Finder V2</h1>
        </div>

        <div class="card">
            <h3><i class="fas fa-tag"></i> 🎯 رقم التاج المطلوب</h3>
            <input type="text" id="targetTag" class="target-input" placeholder="مثال: E2001234567890" autocomplete="off">
            <div class="btn-group">
                <button id="pasteBtn" class="btn btn-primary"><i class="fas fa-paste"></i> لصق</button>
                <button id="startBtn" class="btn btn-success"><i class="fas fa-search"></i> بدء البحث</button>
                <button id="clearBtn" class="btn btn-danger"><i class="fas fa-eraser"></i> مسح</button>
            </div>
        </div>

        <div class="card">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <div>
                    <span class="status-light off" id="statusLight"></span>
                    <span id="statusText">في انتظار التاج</span>
                </div>
                <button id="testBtn" class="btn btn-warning" style="padding: 8px 15px;"><i class="fas fa-bell"></i> اختبار</button>
            </div>

            <!-- معلومات التصحيح -->
            <div class="match-info" id="matchInfo" style="display: none;">
                <i class="fas fa-info-circle"></i> مقارنة:
                <span id="compareTarget"></span> ← → <span id="compareScanned"></span>
            </div>

            <div id="foundBeacon" class="found-beacon">
                <i class="fas fa-check-circle"></i>
                <h2>🎉 تم العثور على التاج! 🎉</h2>
                <p id="foundTag" style="font-family: monospace; font-size: 1.2rem;"></p>
            </div>
        </div>

        <div class="card">
            <h3><i class="fas fa-list"></i> التاجات المقروءة <span id="count" style="background:#4361ee; padding:2px 8px; border-radius:20px;">0</span></h3>
            
            <!-- عرض البيانات الخام من القارئ -->
            <div style="background: #0a0a1a; border-radius: 10px; padding: 10px; margin-bottom: 10px;">
                <div style="font-size: 11px; color: #888;">📡 آخر قراءة (خام):</div>
                <div id="rawLastRead" class="raw-data" style="color: #f8961e; word-break: break-all;">--</div>
            </div>
            
            <div class="tag-list" id="tagList">
                <div style="text-align:center; padding:30px; color:#666;">
                    <i class="fas fa-bluetooth-b" style="font-size:2rem;"></i><br>
                    قم بمسح التاجات - ستظهر هنا
                </div>
            </div>
            <div class="btn-group" style="margin-top:15px;">
                <button id="focusBtn" class="btn btn-primary"><i class="fas fa-keyboard"></i> تفعيل القارئ</button>
                <button id="clearTagsBtn" class="btn btn-danger"><i class="fas fa-trash"></i> مسح القائمة</button>
            </div>
        </div>
    </div>

    <input type="text" id="hiddenScanner" autofocus>

    <script>
        // ============================================
        // المتغيرات
        // ============================================
        let targetTag = "";
        let isSearching = false;
        let scannedTags = [];
        let audioCtx = null;
        let lastRawData = "";
        let readBuffer = "";
        let bufferTimeout = null;

        // عناصر DOM
        const targetInput = document.getElementById('targetTag');
        const pasteBtn = document.getElementById('pasteBtn');
        const startBtn = document.getElementById('startBtn');
        const clearBtn = document.getElementById('clearBtn');
        const testBtn = document.getElementById('testBtn');
        const focusBtn = document.getElementById('focusBtn');
        const clearTagsBtn = document.getElementById('clearTagsBtn');
        const statusLight = document.getElementById('statusLight');
        const statusText = document.getElementById('statusText');
        const foundBeacon = document.getElementById('foundBeacon');
        const foundTagSpan = document.getElementById('foundTag');
        const tagList = document.getElementById('tagList');
        const countSpan = document.getElementById('count');
        const rawLastRead = document.getElementById('rawLastRead');
        const matchInfo = document.getElementById('matchInfo');
        const compareTarget = document.getElementById('compareTarget');
        const compareScanned = document.getElementById('compareScanned');
        const hiddenScanner = document.getElementById('hiddenScanner');

        // ============================================
        // دالة تنظيف البيانات من Enter ومسافات
        // ============================================
        function cleanTagData(rawData) {
            // إزالة Enter (\r, \n) والمسافات والتبويب
            let cleaned = rawData
                .replace(/[\r\n\t]/g, '')      // إزالة Enter و Tab
                .replace(/\s/g, '')             // إزالة المسافات
                .replace(/[^A-Za-z0-9]/g, '')   // إزالة أي رموز غريبة
                .toUpperCase();
            
            // إزالة أي أحرف مكررة أو غير مرغوب فيها
            cleaned = cleaned.trim();
            
            return cleaned;
        }

        // ============================================
        // نظام الصوت
        // ============================================
        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        function playSound(freq, duration, vol = 0.15) {
            initAudio();
            try {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.frequency.value = freq;
                gain.gain.setValueAtTime(0, audioCtx.currentTime);
                gain.gain.linearRampToValueAtTime(vol, audioCtx.currentTime + 0.01);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
                osc.start();
                osc.stop(audioCtx.currentTime + duration);
            } catch(e) {}
        }

        function playFoundSound() {
            playSound(523, 0.12, 0.2);
            setTimeout(() => playSound(659, 0.12, 0.2), 100);
            setTimeout(() => playSound(784, 0.2, 0.25), 200);
            setTimeout(() => playSound(1047, 0.3, 0.2), 400);
        }

        function playScanSound() {
            playSound(600, 0.05, 0.1);
        }

        // ============================================
        // معالجة القراءة من القارئ (المشكلة الأساسية)
        // ============================================
        function processScan(rawData) {
            // عرض البيانات الخام للتصحيح
            lastRawData = rawData;
            rawLastRead.innerHTML = `"${escapeHtml(rawData)}" (${rawData.length} حرف)`;
            
            // تنظيف البيانات
            const cleaned = cleanTagData(rawData);
            
            console.log(`📡 خام: "${rawData}"`);
            console.log(`🧹 منقى: "${cleaned}"`);
            
            // التحقق من أن لدينا رقم صالح
            if (cleaned.length >= 6 && cleaned.length <= 32) {
                playScanSound();
                
                // إضافة إلى القائمة
                addTagToList(cleaned, rawData);
                
                // المقارنة مع التاج المطلوب
                if (isSearching && targetTag) {
                    const targetClean = cleanTagData(targetTag);
                    
                    // عرض معلومات المقارنة للتصحيح
                    matchInfo.style.display = 'block';
                    compareTarget.textContent = `"${targetClean}"`;
                    compareScanned.textContent = `"${cleaned}"`;
                    
                    console.log(`🔍 مقارنة: "${targetClean}" == "${cleaned}" ? ${targetClean === cleaned}`);
                    
                    if (targetClean === cleaned) {
                        console.log("✅✅✅ تم العثور على التاج! ✅✅✅");
                        onTagFound(cleaned);
                    } else {
                        console.log(`❌ ليس التاج المطلوب. المطلوب: ${targetClean}, المقروء: ${cleaned}`);
                        showToast(`📡 قرأ: ${formatEPC(cleaned)} - ليس التاج المطلوب`, 1500);
                    }
                }
            } else {
                console.log(`⚠️ بيانات غير صالحة: "${cleaned}" (طول ${cleaned.length})`);
                if (cleaned.length > 0 && cleaned.length < 6) {
                    rawLastRead.innerHTML += `<span style="color: #f8961e;"> ⚠️ البيانات قصيرة جداً (${cleaned.length} حرف)</span>`;
                }
            }
        }

        // التقاط من الكيبورد (Bluetooth Reader)
        function setupCapture() {
            hiddenScanner.focus();
            
            hiddenScanner.addEventListener('input', (e) => {
                const value = e.target.value;
                if (value && value.length > 0) {
                    processScan(value);
                    hiddenScanner.value = '';
                }
            });
            
            // استماع لأحداث الكيبورد
            let keyboardBuffer = "";
            let keyboardTimeout = null;
            
            document.addEventListener('keypress', (e) => {
                if (document.activeElement === targetInput) return;
                
                const char = e.key;
                keyboardBuffer += char;
                
                if (keyboardTimeout) clearTimeout(keyboardTimeout);
                keyboardTimeout = setTimeout(() => {
                    if (keyboardBuffer.length >= 4) {
                        processScan(keyboardBuffer);
                    }
                    keyboardBuffer = "";
                }, 50);
            });
            
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && keyboardBuffer.length > 0) {
                    processScan(keyboardBuffer);
                    keyboardBuffer = "";
                    if (keyboardTimeout) clearTimeout(keyboardTimeout);
                }
            });
            
            // إعادة التركيز
            document.body.addEventListener('click', () => {
                if (document.activeElement !== hiddenScanner && document.activeElement !== targetInput) {
                    hiddenScanner.focus();
                }
            });
        }

        // ============================================
        // إدارة القائمة
        // ============================================
        function addTagToList(epc, rawData) {
            // التحقق من التكرار
            const existing = scannedTags.find(t => t.epc === epc);
            if (existing) {
                // تحديث الوقت
                existing.time = new Date().toLocaleTimeString('ar-SA');
                existing.raw = rawData;
                updateTagList();
                return;
            }
            
            scannedTags.unshift({
                id: scannedTags.length + 1,
                epc: epc,
                raw: rawData,
                time: new Date().toLocaleTimeString('ar-SA')
            });
            
            updateTagList();
            showToast(`✅ تمت قراءة: ${formatEPC(epc)}`, 1500);
        }

        function updateTagList() {
            if (scannedTags.length === 0) {
                tagList.innerHTML = `<div style="text-align:center; padding:30px; color:#666;">
                    <i class="fas fa-bluetooth-b" style="font-size:2rem;"></i><br>
                    قم بمسح التاجات - ستظهر هنا
                </div>`;
                countSpan.textContent = '0';
                return;
            }
            
            const targetClean = targetTag ? cleanTagData(targetTag) : "";
            
            tagList.innerHTML = scannedTags.map(t => {
                const isMatch = targetClean && t.epc === targetClean;
                return `
                    <div class="tag-item ${isMatch ? 'found' : ''}" onclick="setAsTarget('${t.epc}')">
                        <div>
                            <div class="tag-epc">${formatEPC(t.epc)}</div>
                            <div style="font-size:10px; color:#888;">${t.time}</div>
                            ${t.raw ? `<div style="font-size:9px; color:#f8961e;">خام: "${escapeHtml(t.raw.substring(0, 30))}"</div>` : ''}
                        </div>
                        <div>
                            ${isMatch ? '<span style="background:#06ffa5; color:#000; padding:4px 8px; border-radius:20px;">✓ المطلوب</span>' : ''}
                        </div>
                    </div>
                `;
            }).join('');
            
            countSpan.textContent = scannedTags.length;
        }

        function setAsTarget(epc) {
            targetInput.value = epc;
            targetTag = epc;
            showToast(`🎯 تم تعيين: ${formatEPC(epc)}`, 1500);
            startSearch();
        }

        function clearTagList() {
            scannedTags = [];
            updateTagList();
            showToast('🗑️ تم مسح القائمة', 1500);
        }

        // ============================================
        // عند العثور على التاج
        // ============================================
        function onTagFound(epc) {
            playFoundSound();
            if (navigator.vibrate) navigator.vibrate([200, 100, 200, 100, 300]);
            
            foundBeacon.style.display = 'block';
            foundTagSpan.textContent = formatEPC(epc);
            statusLight.className = 'status-light found';
            statusText.innerHTML = '✅ تم العثور على التاج!';
            isSearching = false;
            
            targetInput.style.borderColor = '#06ffa5';
            targetInput.style.boxShadow = '0 0 20px rgba(6,255,165,0.5)';
            
            updateTagList();
            
            showToast(`🎯🎯🎯 تم العثور على التاج المطلوب! ${formatEPC(epc)} 🎯🎯🎯`, 5000);
            
            setTimeout(() => {
                targetInput.style.borderColor = '';
                targetInput.style.boxShadow = '';
            }, 3000);
            
            setTimeout(() => {
                foundBeacon.style.display = 'none';
            }, 8000);
        }

        // ============================================
        // التحكم الرئيسي
        // ============================================
        function startSearch() {
            let newTarget = targetInput.value.trim();
            if (!newTarget) {
                showToast('⚠️ الرجاء إدخال رقم التاج المطلوب', 2000);
                return;
            }
            
            targetTag = newTarget;
            isSearching = true;
            
            statusLight.className = 'status-light searching';
            statusText.innerHTML = '🔍 جاري البحث... امسح التاجات';
            foundBeacon.style.display = 'none';
            matchInfo.style.display = 'none';
            
            updateTagList();
            
            showToast(`🎯 البحث عن: ${formatEPC(cleanTagData(targetTag))}`, 2000);
            showToast(`🔍 اذهب إلى المخزن وامسح التاجات`, 2500);
            
            playSound(800, 0.1, 0.15);
            
            console.log(`🔍 بدء البحث عن: "${cleanTagData(targetTag)}"`);
        }

        function clearTarget() {
            targetTag = "";
            targetInput.value = "";
            isSearching = false;
            statusLight.className = 'status-light off';
            statusText.innerHTML = 'في انتظار التاج';
            foundBeacon.style.display = 'none';
            matchInfo.style.display = 'none';
            targetInput.style.borderColor = '';
            targetInput.style.boxShadow = '';
            updateTagList();
            showToast('تم مسح التاج المستهدف', 1500);
        }

        async function pasteFromClipboard() {
            try {
                const text = await navigator.clipboard.readText();
                if (text) {
                    const cleaned = cleanTagData(text);
                    targetInput.value = cleaned;
                    showToast(`✅ تم لصق الرقم: ${formatEPC(cleaned)}`, 2000);
                    startSearch();
                } else {
                    showToast('الحافظة فارغة', 1500);
                }
            } catch(e) {
                showToast('الرجاء لصق الرقم يدوياً (Ctrl+V)', 1500);
            }
        }

        function testSystem() {
            playFoundSound();
            if (navigator.vibrate) navigator.vibrate(200);
            foundBeacon.style.display = 'block';
            foundTagSpan.textContent = 'اختبار النظام';
            setTimeout(() => {
                foundBeacon.style.display = 'none';
            }, 2000);
            showToast('🔊✅ اختبار الصوت والضوء', 2000);
        }

        // ============================================
        // أدوات مساعدة
        // ============================================
        function formatEPC(epc) {
            if (!epc) return '';
            return epc.match(/.{1,4}/g)?.join(' ') || epc;
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            }).replace(/[\r\n]/g, '↵');
        }

        function showToast(msg, duration = 2000) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerHTML = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), duration);
        }

        // ============================================
        // الأحداث
        // ============================================
        pasteBtn.addEventListener('click', pasteFromClipboard);
        startBtn.addEventListener('click', startSearch);
        clearBtn.addEventListener('click', clearTarget);
        testBtn.addEventListener('click', testSystem);
        focusBtn.addEventListener('click', () => {
            hiddenScanner.focus();
            showToast('👆 القارئ جاهز - امسح أي تاج الآن', 1500);
        });
        clearTagsBtn.addEventListener('click', clearTagList);
        targetInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') startSearch();
        });

        // جعل setAsTarget متاحة عالمياً
        window.setAsTarget = setAsTarget;

        // التهيئة
        setupCapture();
        hiddenScanner.focus();
        
        document.body.addEventListener('click', () => initAudio(), { once: true });
        
        showToast('✨ النظام جاهز - تم تصحيح مشكلة Enter', 3000);
        
        console.log('✅ RFID Finder V2 جاهز - تم تنظيف البيانات من Enter والمسافات');
    </script>
</body>
</html>
